<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Settings – Current</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="settings-page">
  <div class="modal-overlay show settings-overlay" id="settings-modal">
    <div class="glass modal-card settings-card">
      <h3>Settings</h3>
      <div class="form-group">
        <label for="library-dir-input">Library Folder</label>
        <input type="text" id="library-dir-input" placeholder="Path to library folder" />
        <button id="browse-dir-btn" class="liquid-button secondary">Browse…</button>
      </div>
      <div class="modal-actions">
        <button id="settings-cancel-btn" class="liquid-button secondary danger">Cancel</button>
        <button id="settings-save-btn" class="liquid-button primary">Save</button>
      </div>
    </div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
