<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Current</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="titlebar-spacer"></div>

<div class="shell">

  <div class="brand">
    <h1>Current</h1>
    <p>Pulling into <span id="library-path" class="clickable-path" title="Click to choose another folder…">~/Music/Current</span></p>
    <button id="dj-view-btn" class="liquid-button secondary">Switch to DJ View</button>
  </div>


  <form id="universal-form" class="glass composer">
    <input type="text" id="universal-input" placeholder="Search library or paste link to pull..." autocomplete="off">
    <button type="submit" id="pull-btn" class="pull-button">Pull</button>
  </form>
  <div id="predictions-dropdown" class="predictions-dropdown glass">
  <div id="prediction-loader" class="prediction-loading hidden">
    <svg class="loader-spinner" viewBox="0 0 50 50">
      <circle class="loader-circle" cx="25" cy="25" r="20" fill="none" stroke="var(--text-faint)" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>
  <div id="pull-all-bar" class="pull-all-bar">
    <span class="pull-all-label" id="pull-all-label">0 selected</span>
    <button class="pull-all-btn" id="pull-all-btn">Pull All</button>
  </div>
</div>
  <div class="error-banner" id="error-banner"></div>

  <div class="queue" id="queue"></div>

  <div class="glass panel">
    <div class="panel-top library-nav">
      <div class="library-nav-main">
        <div class="library-heading">
          <div class="library-title">Library</div>
          <div class="library-summary" id="library-summary">Loading library</div>
        </div>
        <div class="library-tools">
          <select id="sort-select" class="sort-select" aria-label="Sort library">
            <option value="recent">Recent</option>
            <option value="title">Title</option>
            <option value="duration">Duration</option>
            <option value="source">Source</option>
          </select>
          <button type="button" id="library-reset-btn" class="filter-reset">Reset</button>
        </div>
      </div>
      <div class="filter-row source-filter" id="source-filter"></div>
      <div class="filter-row color-filter" id="color-filter"></div>
      <div class="filter-row tag-filter" id="tag-filter"></div>
    </div>
    <div class="file-list" id="file-list">
      <div class="empty-state">Loading library…</div>
    </div>
  </div>

</div>

<div class="now-playing" id="now-playing">
  <div class="np-info">
    <div class="np-title" id="np-title">—</div>
    <div class="np-meta" id="np-meta">&nbsp;</div>
  </div>
  <audio id="player" controls></audio>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="glass modal-card">
    <h3>Edit Track Info</h3>
    <div class="modal-body">
      <div class="form-group">
        <label>Tags (comma separated)</label>
        <input type="text" id="modal-tags-input" placeholder="e.g. lo-fi, chill, favorite" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Color Marker</label>
        <div class="color-picker" id="modal-color-picker">
          <div class="color-option color-none selected" data-color="none" title="None"></div>
          <div class="color-option color-red" data-color="red" title="Red"></div>
          <div class="color-option color-orange" data-color="orange" title="Orange"></div>
          <div class="color-option color-yellow" data-color="yellow" title="Yellow"></div>
          <div class="color-option color-green" data-color="green" title="Green"></div>
          <div class="color-option color-blue" data-color="blue" title="Blue"></div>
          <div class="color-option color-purple" data-color="purple" title="Purple"></div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button id="modal-cancel-btn">Cancel</button>
      <button id="modal-save-btn">Save</button>
    </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
