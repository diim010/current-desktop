<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Current</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="titlebar-spacer"></div>

<div class="shell">

  <div class="brand">
    <h1>Current</h1>
    <p>Pulling into <span id="library-path" class="clickable-path" title="Click to choose another folder…">~/Music/Current</span></p>
  </div>
  <div class="settings">
    <button id="settings-btn" class="settings-button">Settings</button>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="glass modal-card">
      <h3>Settings</h3>
      <div class="modal-body">
        <div class="form-group">
          <label>Library Folder</label>
          <div id="settings-library-path" class="clickable-path" title="Click to choose another folder…">Loading…</div>
        </div>
        <div class="form-group">
          <label>Theme</label>
          <select id="settings-theme-select">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button id="settings-cancel-btn">Cancel</button>
        <button id="settings-save-btn">Save</button>
      </div>
    </div>
  </div>

  <form id="universal-form" class="glass composer">
    <input type="text" id="universal-input" placeholder="Search library or paste link to pull..." autocomplete="off">
    <button type="submit" id="pull-btn" class="pull-button">Pull</button>
  </form>
  <div class="error-banner" id="error-banner"></div>

  <div class="queue" id="queue"></div>

  <div class="glass panel">
    <div class="panel-top">
      <div class="tabs" id="tabs">
        <div class="tab active" data-source="all">All</div>
        <div class="tab" data-source="youtube">YouTube</div>
        <div class="tab" data-source="youtube-music">YT Music</div>
        <div class="tab" data-source="soundcloud">SoundCloud</div>
      </div>
    </div>
    <div class="file-list" id="file-list">
      <div class="empty-state">Loading library…</div>
    </div>
  </div>

</div>

<div class="now-playing" id="now-playing">
  <div class="np-info">
    <div class="np-title" id="np-title">—</div>
    <div class="np-meta" id="np-meta">&nbsp;</div>
  </div>
  <audio id="player" controls></audio>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="glass modal-card">
    <h3>Edit Track Info</h3>
    <div class="modal-body">
      <div class="form-group">
        <label>Tags (comma separated)</label>
        <input type="text" id="modal-tags-input" placeholder="e.g. lo-fi, chill, favorite" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Color Marker</label>
        <div class="color-picker" id="modal-color-picker">
          <div class="color-option color-none selected" data-color="none" title="None"></div>
          <div class="color-option color-red" data-color="red" title="Red"></div>
          <div class="color-option color-orange" data-color="orange" title="Orange"></div>
          <div class="color-option color-yellow" data-color="yellow" title="Yellow"></div>
          <div class="color-option color-green" data-color="green" title="Green"></div>
          <div class="color-option color-blue" data-color="blue" title="Blue"></div>
          <div class="color-option color-purple" data-color="purple" title="Purple"></div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button id="modal-cancel-btn">Cancel</button>
      <button id="modal-save-btn">Save</button>
    </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
